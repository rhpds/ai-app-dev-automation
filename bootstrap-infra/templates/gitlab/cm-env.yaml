apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-cm
  namespace: {{ .Values.gitlab.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  DB_ADAPTER: postgresql
  DB_HOST: gitlab-postgresql.{{ .Values.gitlab.namespace }}.svc
  DB_NAME: gitlab_production
  DB_PORT: "5432"
  DB_USER: gitlab
  GITLAB_BACKUP_SCHEDULE: daily
  GITLAB_BACKUP_TIME: "04:30"
  GITLAB_EMAIL: gitlab@rhdemo.com
  GITLAB_EMAIL_DISPLAY_NAME: GitLab Admin
  GITLAB_EMAIL_REPLY_TO: noreply@rhdemo.com
  GITLAB_HOST: gitlab-{{ .Values.gitlab.namespace }}.{{ .Values.deployer.domain }}
  GITLAB_HTTPS: "true"
  GITLAB_NOTIFY_ON_BROKEN_BUILDS: "true"
  GITLAB_NOTIFY_PUSHER: "false"
  GITLAB_PIPELINE_SCHEDULE_WORKER_CRON: "*/5 * * * *"
  GITLAB_PORT: "443"
  GITLAB_ROOT_EMAIL: root@rhdemo.com
  GITLAB_SSH_PORT: "22"
  GITLAB_TIMEZONE: Berlin
  NGINX_MAX_UPLOAD_SIZE: 100m
  REDIS_HOST: gitlab-redis.{{ .Values.gitlab.namespace }}.svc
  REDIS_PORT: "6379"
  SMTP_ENABLED: "false"
  TZ: Europe/Berlin
