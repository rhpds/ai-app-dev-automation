apiVersion: v1
kind: Secret
metadata:
  name: gitlab-secret
  namespace: {{ .Values.gitlab.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  DB_PASS: passw0rd
  GITLAB_ROOT_PASSWORD: {{ .Values.gitlab.rootPassword }}
  GITLAB_SECRETS_DB_KEY_BASE: "0123456789"
  GITLAB_SECRETS_OTP_KEY_BASE: "0123456789"
  GITLAB_SECRETS_SECRET_KEY_BASE: "0123456789"
