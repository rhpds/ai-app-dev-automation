apiVersion: v1
kind: Service
metadata:
  name: gitlab-postgresql
  namespace: {{ .Values.gitlab.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    name: gitlab-postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-redis
  namespace: {{ .Values.gitlab.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    name: gitlab-redis
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: {{ .Values.gitlab.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ports:
    - name: ssh
      port: 22
    - name: http
      port: 80
  selector:
    app: gitlab
