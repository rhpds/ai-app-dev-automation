apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-persistent-storage
  namespace: {{ .Values.gitlab.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
