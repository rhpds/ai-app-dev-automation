apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: {{ .Values.gitlab.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      serviceAccountName: gitlab
      containers:
        - name: gitlab
          image: {{ .Values.gitlab.image }}
          envFrom:
            - configMapRef:
                name: gitlab-cm
            - secretRef:
                name: gitlab-secret
          ports:
            - containerPort: 22
              name: ssh
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /home/git/data
              name: gitlab-persistent-storage
            - mountPath: /scripts
              name: create-root-pat-vol
      volumes:
        - name: gitlab-persistent-storage
          persistentVolumeClaim:
            claimName: gitlab-persistent-storage
        - name: create-root-pat-vol
          configMap:
            name: cm-create-root-pat
            defaultMode: 0777
