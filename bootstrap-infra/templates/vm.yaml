---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.vm.name }}
  namespace: {{ .Values.vm.namespace }}
type: Opaque
stringData:
  accessKeyId: {{ .Values.vm.sourceAccessKeyId }}
  secretKey: {{ .Values.vm.sourceSecretAccessKey }}
---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: {{ .Values.vm.name }}
  namespace: {{ .Values.vm.namespace }}
  annotations:
    # Required for WaitForFirstConsumer storage classes (AWS EBS gp3-csi).
    # Without this, CDI and the storage provisioner deadlock waiting for each other.
    cdi.kubevirt.io/storage.bind.immediate.requested: "true"
spec:
  source:
    s3:
      url: {{ .Values.vm.sourceUrl }}
      secretRef: {{ .Values.vm.name }}
  storage:
    {{- if .Values.vm.storageClass }}
    storageClassName: {{ .Values.vm.storageClass }}
    {{- end }}
    accessModes:
      - ReadWriteOnce    # AWS EBS only supports RWO — CNV clusters use RWX with Ceph
    volumeMode: Filesystem  # EBS CDI import requires Filesystem, not Block
    resources:
      requests:
        storage: {{ .Values.vm.size }}
---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataSource
metadata:
  name: {{ .Values.vm.name }}
  namespace: {{ .Values.vm.namespace }}
spec:
  source:
    pvc:
      name: {{ .Values.vm.name }}
      namespace: {{ .Values.vm.namespace }}
