apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-plugins
  namespace: {{ .Values.devhub.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false
        pluginConfig:
          catalog:
            providers:
              keycloakOrg:
                default:
                  baseUrl: https://sso.{{ .Values.deployer.domain }}
                  realm: {{ .Values.devhub.keycloakRealm }}
                  loginRealm: {{ .Values.devhub.keycloakRealm }}
                  clientId: ${OAUTH_CLIENT_ID}
                  clientSecret: ${OAUTH_CLIENT_SECRET}
                  schedule:
                    frequency:
                      minutes: 2
                    timeout:
                      minutes: 1
                    initialDelay:
                      seconds: 15
      - package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-gitlab-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-gitlab-dynamic
        disabled: false
        pluginConfig:
          catalog:
            providers:
              gitlab:
                gitlab:
                  host: gitlab-{{ .Values.gitlab.namespace }}.{{ .Values.deployer.domain }}
                  branch: main
                  fallbackBranch: main
                  group: rhdh
                  entityFilename: catalog-info.yaml
                  schedule:
                    frequency:
                      minutes: 5
                    timeout:
                      minutes: 3
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-tekton
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: TektonCIComponent
                    config:
                      layout:
                        gridColumn: "7 / -1"
                        gridRow: "1 / 3"
      - package: ./dynamic-plugins/dist/backstage-community-plugin-scaffolder-backend-module-kubernetes-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
        disabled: false
      # Disable the quickstart plugin to avoid distracting people on initial sign-in
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-quickstart
        disabled: true
