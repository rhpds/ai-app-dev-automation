apiVersion: batch/v1
kind: Job
metadata:
  name: create-keycloak-backstage-client
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: create-client
          image: {{ .Values.jobCliImage }}
          env:
            - name: KC_URL
              value: https://sso.{{ .Values.deployer.domain }}
            - name: KC_REALM
              value: {{ .Values.devhub.keycloakRealm }}
            - name: CLIENT_ID
              value: {{ .Values.devhub.oauth.clientId }}
            - name: CLIENT_SECRET
              value: {{ .Values.devhub.oauth.clientSecret }}
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: username
            - name: KC_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              TOKEN=$(curl -sk "${KC_URL}/realms/master/protocol/openid-connect/token" \
                -d "client_id=admin-cli" \
                -d "username=${KC_ADMIN_USER}" \
                -d "password=${KC_ADMIN_PASS}" \
                -d "grant_type=password" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

              STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
                "${KC_URL}/admin/realms/${KC_REALM}/clients?clientId=${CLIENT_ID}" \
                -H "Authorization: Bearer $TOKEN")

              EXISTING=$(curl -sk "${KC_URL}/admin/realms/${KC_REALM}/clients?clientId=${CLIENT_ID}" \
                -H "Authorization: Bearer $TOKEN" | python3 -c "import sys,json; r=json.load(sys.stdin); print(len(r))")

              if [ "$EXISTING" -gt 0 ]; then
                echo "Client '${CLIENT_ID}' already exists, skipping."
                exit 0
              fi

              HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X POST \
                "${KC_URL}/admin/realms/${KC_REALM}/clients" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"clientId\": \"${CLIENT_ID}\",
                  \"enabled\": true,
                  \"protocol\": \"openid-connect\",
                  \"publicClient\": false,
                  \"clientAuthenticatorType\": \"client-secret\",
                  \"secret\": \"${CLIENT_SECRET}\",
                  \"standardFlowEnabled\": true,
                  \"directAccessGrantsEnabled\": true,
                  \"serviceAccountsEnabled\": true,
                  \"redirectUris\": [\"*\"]
                }")

              if [ "$HTTP_CODE" = "201" ]; then
                echo "Client '${CLIENT_ID}' created successfully."
              else
                echo "Failed to create client. HTTP status: ${HTTP_CODE}"
                exit 1
              fi
