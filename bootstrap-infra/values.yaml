# Default values for bootstrap.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

user:
  count: 2
  prefix: user

deployer:
  domain: apps.cluster-guid.sandbox.opentlc.com
  apiUrl: https://api.cluster-guid.sandbox.opentlc.com:6443

vm:
  name: student-vm
  namespace: openshift-virtualization-os-images
  sourceUrl: https://s3.us-east-1.amazonaws.com/rhdp-images/lb2862.qcow2
  sourceAccessKeyId: change-me
  sourceSecretAccessKey: change-me
  size: 30Gi
  storageClass: ocs-external-storagecluster-ceph-rbd-immediate

devhub:
  namespace: rhdh
  channel: fast-1.8
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  keycloakRealm: sso
  oauth:
    clientId: backstage
    clientSecret: backstage-client-secret-demo
  backendSecret: demo-backend-secret-key-change-me

gitlab:
  namespace: gitlab
  image: quay.io/redhat-gpte/gitlab:17.4.1
  postgresqlImage: quay.io/redhat-gpte/gitlab-postgresql:14
  redisImage: redis:6.2.6
  rootPassword: Dem0-G1tl4b!2026
  repos:
    - name: ai-app-dev-automation
      sourceUrl: https://github.com/rhpds/ai-app-dev-automation.git
    - name: parasol-chat
      sourceUrl: https://github.com/redhat-ads-tech/parasol-chat.git

tenantLifecycleNamespace: tenant-lifecycle

jobCliImage: registry.redhat.io/openshift4/ose-cli:latest
jobAnsibleImage: quay.io/agnosticd/ee-multicloud:latest

# This is the user-scoped git repo, where per seat user resources are stored.
# Set to empty to NOT create workspaces.
# workspace: ""
workspace:
  git:
    url: https://github.com/rhpds/ai-app-dev-automation.git
    revision: main
    path: bootstrap-tenant
