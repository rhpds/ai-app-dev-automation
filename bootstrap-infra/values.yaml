  postgresqlImage: quay.io/redhat-gpte/gitlab-postgresql:14
  redisImage: redis:6.2.6
  rootPassword: Dem0-G1tl4b!2026

jobCliImage: registry.redhat.io/openshift4/ose-cli:latest
jobAnsibleImage: quay.io/agnosticd/ee-multicloud:latest

# This is the user-scoped git repo, where per seat user resources are stored.
# Set to empty to NOT create workspaces.
