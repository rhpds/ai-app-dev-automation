apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-gitlab-webhook
  namespace: "{{ .Values.username }}-{{ .Values.namespaceSuffix }}"
data:
  create-webhook.yaml: |
    ---
    - name: Create GitLab webhook for Tekton pipeline
      hosts: localhost
      vars:
        gitlab_namespace: {{ .Values.gitlab.namespace }}
        gitlab_host: gitlab-{{ .Values.gitlab.namespace }}.{{ .Values.deployer.domain }}
        cluster_domain: {{ .Values.deployer.domain }}
        username: {{ .Values.username }}
        namespace: {{ .Values.username }}-{{ .Values.namespaceSuffix }}
        component_id: ai-app-dev
      tasks:
        - name: Retrieve root token
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: root-user-personal-token
            namespace: '{{ "{{" }} gitlab_namespace {{ "}}" }}'
          register: r_root_token
          failed_when: r_root_token.resources[0].data.token | length == 0

        - name: Decode root token
          set_fact:
            root_token: '{{ "{{" }} r_root_token.resources[0].data.token | b64decode {{ "}}" }}'

        - name: Set EventListener route URL
          set_fact:
            el_route_url: 'https://{{ "{{" }} component_id {{ "}}" }}-el-{{ "{{" }} namespace {{ "}}" }}.{{ "{{" }} cluster_domain {{ "}}" }}'

        - name: Retrieve webhook secret
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: webhook-secret
            namespace: '{{ "{{" }} namespace {{ "}}" }}'
          register: r_webhook_secret
          failed_when: r_webhook_secret.resources | length == 0

        - name: Decode webhook secret
          set_fact:
            webhook_token: '{{ "{{" }} r_webhook_secret.resources[0].data.token | b64decode {{ "}}" }}'

        - name: Get project ID
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/projects/{{ "{{" }} username {{ "}}" }}%2F{{ "{{" }} component_id {{ "}}" }}
            method: GET
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
          register: r_project
          retries: 30
          delay: 10
          until: r_project.status == 200

        - name: Check for existing webhooks
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/projects/{{ "{{" }} r_project.json.id {{ "}}" }}/hooks
            method: GET
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
          register: r_hooks

        - name: Create webhook
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/projects/{{ "{{" }} r_project.json.id {{ "}}" }}/hooks
            method: POST
            body_format: json
            body:
              url: '{{ "{{" }} el_route_url {{ "}}" }}'
              token: '{{ "{{" }} webhook_token {{ "}}" }}'
              push_events: true
              push_events_branch_filter: main
              enable_ssl_verification: false
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
            status_code: [201]
          when: r_hooks.json | selectattr('url', 'equalto', el_route_url) | list | length == 0

  delete-webhook.yaml: |
    ---
    - name: Delete GitLab webhooks for Tekton pipeline
      hosts: localhost
      vars:
        gitlab_namespace: {{ .Values.gitlab.namespace }}
        gitlab_host: gitlab-{{ .Values.gitlab.namespace }}.{{ .Values.deployer.domain }}
        username: {{ .Values.username }}
        component_id: ai-app-dev
      tasks:
        - name: Retrieve root token
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: root-user-personal-token
            namespace: '{{ "{{" }} gitlab_namespace {{ "}}" }}'
          register: r_root_token
          failed_when: r_root_token.resources[0].data.token | length == 0

        - name: Decode root token
          set_fact:
            root_token: '{{ "{{" }} r_root_token.resources[0].data.token | b64decode {{ "}}" }}'

        - name: Get project ID
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/projects/{{ "{{" }} username {{ "}}" }}%2F{{ "{{" }} component_id {{ "}}" }}
            method: GET
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
            status_code: [200, 404]
          register: r_project

        - name: Get webhooks
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/projects/{{ "{{" }} r_project.json.id {{ "}}" }}/hooks
            method: GET
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
          register: r_hooks
          when: r_project.status == 200

        - name: Delete all webhooks
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/projects/{{ "{{" }} r_project.json.id {{ "}}" }}/hooks/{{ "{{" }} item.id {{ "}}" }}
            method: DELETE
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
            status_code: [204, 404]
          loop: '{{ "{{" }} r_hooks.json | default([]) {{ "}}" }}'
          when: r_project.status == 200 and r_hooks.json is defined
