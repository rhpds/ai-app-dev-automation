apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-cleanup-{{ .Values.username }}
  namespace: {{ .Values.tenantLifecycleNamespace }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: tenant-lifecycle
      containers:
        - name: ansible
          image: {{ .Values.jobAnsibleImage }}
          command:
            - /bin/sh
            - -c
            - ansible-playbook /playbooks/delete-user.yaml
          volumeMounts:
            - name: playbooks
              mountPath: /playbooks
      volumes:
        - name: playbooks
          configMap:
            name: cm-gitlab-cleanup-{{ .Values.username }}
      restartPolicy: Never
  backoffLimit: 3
