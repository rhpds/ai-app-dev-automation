apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-gitlab-user
  namespace: "{{ .Values.username }}-{{ .Values.namespaceSuffix }}"
data:
  create-user.yaml: |
    ---
    - name: Create GitLab user
      hosts: localhost
      vars:
        gitlab_namespace: {{ .Values.gitlab.namespace }}
        gitlab_host: gitlab-{{ .Values.gitlab.namespace }}.{{ .Values.deployer.domain }}
        username: {{ .Values.username }}
        password: {{ .Values.password }}
      tasks:
        - name: Retrieve root token
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: root-user-personal-token
            namespace: '{{ "{{" }} gitlab_namespace {{ "}}" }}'
          register: r_root_token
          failed_when: r_root_token.resources[0].data.token | length == 0

        - name: Decode root token
          set_fact:
            root_token: '{{ "{{" }} r_root_token.resources[0].data.token | b64decode {{ "}}" }}'

        - name: Create user
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/users
            method: POST
            body_format: form-urlencoded
            body:
              admin: false
              email: '{{ "{{" }} username {{ "}}" }}@rhdemo.com'
              public_email: '{{ "{{" }} username {{ "}}" }}@rhdemo.com'
              skip_confirmation: true
              username: '{{ "{{" }} username {{ "}}" }}'
              password: '{{ "{{" }} password {{ "}}" }}'
              name: '{{ "{{" }} username {{ "}}" }}'
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
            status_code: [201, 409]
          register: r_user
          retries: 10
          delay: 5
          until: r_user.status in [201, 409]

        - name: Get user id
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/users?username={{ "{{" }} username {{ "}}" }}
            method: GET
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
          register: r_user_info

        - name: Get rhdh group id
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/groups/rhdh
            method: GET
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
          register: r_rhdh_group

        - name: Add user to rhdh group
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/groups/{{ "{{" }} r_rhdh_group.json.id {{ "}}" }}/members
            method: POST
            body_format: form-urlencoded
            body:
              user_id: '{{ "{{" }} r_user_info.json[0].id {{ "}}" }}'
              access_level: "30"
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
            status_code: [201, 409]

  delete-user.yaml: |
    ---
    - name: Delete GitLab user and catalog entities
      hosts: localhost
      vars:
        gitlab_namespace: {{ .Values.gitlab.namespace }}
        gitlab_host: gitlab-{{ .Values.gitlab.namespace }}.{{ .Values.deployer.domain }}
        username: {{ .Values.username }}
        rhdh_url: https://backstage-developer-hub-{{ .Values.devhub.namespace }}.{{ .Values.deployer.domain }}
        backend_secret: {{ .Values.devhub.backendSecret }}
      tasks:
        - name: Retrieve root token
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: root-user-personal-token
            namespace: '{{ "{{" }} gitlab_namespace {{ "}}" }}'
          register: r_root_token
          failed_when: r_root_token.resources[0].data.token | length == 0

        - name: Decode root token
          set_fact:
            root_token: '{{ "{{" }} r_root_token.resources[0].data.token | b64decode {{ "}}" }}'

        - name: Get user id
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/users?username={{ "{{" }} username {{ "}}" }}
            method: GET
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
          register: r_user_info

        - name: Delete user
          ansible.builtin.uri:
            url: https://{{ "{{" }} gitlab_host {{ "}}" }}/api/v4/users/{{ "{{" }} r_user_info.json[0].id {{ "}}" }}
            method: DELETE
            headers:
              PRIVATE-TOKEN: '{{ "{{" }} root_token {{ "}}" }}'
            validate_certs: false
            status_code: [204, 404]
          when: r_user_info.json | length > 0

        - name: Find catalog entities owned by user
          ansible.builtin.uri:
            url: '{{ "{{" }} rhdh_url {{ "}}" }}/api/catalog/entities/by-query?filter=spec.owner=user:{{ "{{" }} username {{ "}}" }}'
            method: GET
            headers:
              Authorization: 'Bearer {{ "{{" }} backend_secret {{ "}}" }}'
            validate_certs: false
            status_code: [200]
          register: r_catalog_entities
          ignore_errors: true

        - name: Delete catalog entities owned by user
          ansible.builtin.uri:
            url: '{{ "{{" }} rhdh_url {{ "}}" }}/api/catalog/entities/by-uid/{{ "{{" }} item.metadata.uid {{ "}}" }}'
            method: DELETE
            headers:
              Authorization: 'Bearer {{ "{{" }} backend_secret {{ "}}" }}'
            validate_certs: false
            status_code: [204, 404]
          loop: '{{ "{{" }} r_catalog_entities.json.items | default([]) {{ "}}" }}'
          loop_control:
            label: '{{ "{{" }} item.metadata.name {{ "}}" }}'
          when: r_catalog_entities is succeeded
          ignore_errors: true

        - name: Find location entities for user repos
          ansible.builtin.uri:
            url: '{{ "{{" }} rhdh_url {{ "}}" }}/api/catalog/entities/by-query?filter=kind=Location,spec.targets=*{{ "{{" }} username {{ "}}" }}*'
            method: GET
            headers:
              Authorization: 'Bearer {{ "{{" }} backend_secret {{ "}}" }}'
            validate_certs: false
            status_code: [200]
          register: r_catalog_locations
          ignore_errors: true

        - name: Delete location entities for user repos
          ansible.builtin.uri:
            url: '{{ "{{" }} rhdh_url {{ "}}" }}/api/catalog/entities/by-uid/{{ "{{" }} item.metadata.uid {{ "}}" }}'
            method: DELETE
            headers:
              Authorization: 'Bearer {{ "{{" }} backend_secret {{ "}}" }}'
            validate_certs: false
            status_code: [204, 404]
          loop: '{{ "{{" }} r_catalog_locations.json.items | default([]) {{ "}}" }}'
          loop_control:
            label: '{{ "{{" }} item.metadata.name {{ "}}" }}'
          when: r_catalog_locations is succeeded
          ignore_errors: true
