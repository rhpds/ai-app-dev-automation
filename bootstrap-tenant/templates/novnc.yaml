{{ if .Values.vm -}}
---
# ServiceAccount for noVNC proxy
apiVersion: v1
kind: ServiceAccount
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
---
# Role — list pods + port-forward to virt-launcher
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/portforward"]
  verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: novnc
subjects:
- kind: ServiceAccount
  name: novnc
  namespace: "{{ .Values.username }}-vm"
---
# noVNC Deployment
# container 1: kubectl port-forward to virt-launcher pod port 5900 (QEMU VNC)
# container 2: websockify + noVNC — serves web VNC UI on port 8080
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: novnc
  template:
    metadata:
      labels:
        app: novnc
    spec:
      serviceAccountName: novnc
      containers:
      - name: portforward
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            POD=$(kubectl get pod -n {{ .Values.username }}-vm \
              -l vm.kubevirt.io/name=rhel-podman \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "$POD" ]; then
              echo "Forwarding VNC from pod $POD"
              kubectl port-forward pod/$POD 5900:5900 \
                -n {{ .Values.username }}-vm \
                --address 0.0.0.0 || true
            else
              echo "Waiting for virt-launcher pod..."
            fi
            sleep 5
          done
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      - name: novnc
        image: ghcr.io/rhpds/novnc-proxy:v0.1.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
spec:
  selector:
    app: novnc
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
spec:
  to:
    kind: Service
    name: novnc
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
