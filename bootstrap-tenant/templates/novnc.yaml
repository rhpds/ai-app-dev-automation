{{ if .Values.vm -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
rules:
- apiGroups: ["kubevirt.io"]
  resources: ["virtualmachines", "virtualmachineinstances"]
  verbs: ["get", "list"]
- apiGroups: ["subresources.kubevirt.io"]
  resources: ["virtualmachineinstances/vnc", "virtualmachines/vnc"]
  verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: novnc
subjects:
- kind: ServiceAccount
  name: novnc
  namespace: "{{ .Values.username }}-vm"
---
# noVNC Deployment
# Single container: kubectl proxy + Python WebSocket bridge + noVNC UI
# Proxies VNC via KubeVirt API — no SSO required, works on first click
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: novnc
  template:
    metadata:
      labels:
        app: novnc
    spec:
      serviceAccountName: novnc
      containers:
      - name: novnc
        image: ghcr.io/rhpds/novnc-proxy:v0.1.1
        ports:
        - containerPort: 8080
        env:
        - name: NAMESPACE
          value: "{{ .Values.username }}-vm"
        - name: VM_NAME
          value: rhel-podman
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /vnc.html
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
spec:
  selector:
    app: novnc
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: novnc
  namespace: "{{ .Values.username }}-vm"
spec:
  to:
    kind: Service
    name: novnc
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
