apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-job
  namespace: "{{ .Values.username }}-{{ .Values.namespaceSuffix }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-job-token-reader
  namespace: gitlab
subjects:
  - kind: ServiceAccount
    name: gitlab-job
    namespace: "{{ .Values.username }}-{{ .Values.namespaceSuffix }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitlab-token-reader
