{{- $existing := (lookup "v1" "Secret" (printf "%s-%s" .Values.username .Values.namespaceSuffix) "webhook-secret") -}}
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secret
  namespace: "{{ .Values.username }}-{{ .Values.namespaceSuffix }}"
type: Opaque
data:
  {{- if $existing }}
  token: {{ index $existing.data "token" }}
  {{- else }}
  token: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
