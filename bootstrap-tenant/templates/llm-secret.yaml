apiVersion: v1
kind: Secret
metadata:
  name: llm-config
  namespace: "{{ .Values.username }}-{{ .Values.namespaceSuffix }}"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  MODEL_ENDPOINT: "{{ .Values.llm.endpoint }}"
  MODEL_NAME: "{{ .Values.llm.modelName }}"
  MODEL_ENDPOINT_BEARER: "{{ .Values.llm.apiKey }}"
