{{ if .Values.gitea -}}
---
apiVersion: pfe.rhpds.com/v1
kind: Gitea
metadata:
  name: gitea
  namespace: "{{ .Values.username }}-{{ .Values.namespaceSuffix }}"
spec:
  giteaImage: {{ .Values.gitea.image }}
  giteaImageTag: {{ .Values.gitea.imageTag }}
  giteaVolumeSize: 5Gi
  postgresqlImage: {{ .Values.gitea.postgresqlImage }}
  postgresqlImageTag: "{{ .Values.gitea.postgresqlImageTag }}"
  postgresqlVolumeSize: 5Gi
  giteaSsl: true
  giteaAdminUser: "{{ .Values.username }}-admin"
  giteaAdminPassword: {{ .Values.password }}
  giteaAdminEmail: "{{ .Values.username }}-admin@demo.redhat.com"
  giteaCreateUsers: true
  giteaGenerateUserFormat: {{ .Values.username }}
  giteaUserNumber: 1
  giteaUserPassword: {{ .Values.password }}
  giteaUserEmailDomain: "demo.redhat.com"
  giteaMigrateRepositories: true
  giteaRepositoriesList: {{ toJson .Values.gitea.repositoriesList }}
{{- end }}
