apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ai-app-dev
  title: AI App Dev - Parasol Chat
  description: |
    Scaffolds the Parasol Chat AI application into a new GitLab repository
    with a Tekton CI pipeline for building and pushing to the OpenShift
    internal container registry. Also provisions a RHEL 10 virtual machine
    with the Red Hat build of Podman Desktop for local AI development.
spec:
  owner: rhdh
  type: service
  parameters:
    - title: Application Configuration
      required:
        - component_id
        - vm_name
      properties:
        component_id:
          title: Application Name
          type: string
          default: ai-app-dev
          description: Name of the application and GitLab repository
        vm_name:
          title: Virtual Machine Name
          type: string
          default: developer-workstation
          description: >-
            Name for the RHEL 10 developer workstation virtual machine.
            Must contain only lowercase letters, numbers, and hyphens.
            Must start and end with an alphanumeric character.
          pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
          maxLength: 253
          ui:help: "Example: my-dev-vm (lowercase letters, numbers, and hyphens only)"
  steps:
    - id: fetch-app
      name: Fetch Parasol Chat Application Source
      action: fetch:plain
      input:
        url: "https://{{ gitlab_host }}/rhdh/parasol-chat/-/tree/main"
        targetPath: parasol-chat

    - id: overlay
      name: Apply Catalog and Pipeline Manifests
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: .
        replace: true
        values:
          component_id: ${{ parameters.component_id }}
          vm_name: ${{ parameters.vm_name }}
          owner: ${{ user.entity.metadata.name }}
          namespace: ${{ user.entity.metadata.name }}-demo
          gitlab_host: "{{ gitlab_host }}"
          gitlab_namespace: "{{ gitlab_namespace }}"
          cluster_subdomain: "{{ cluster_subdomain }}"
          ansible_image: "{{ ansible_image }}"

    - id: publish
      name: Publish to GitLab
      action: publish:gitlab
      input:
        repoUrl: "{{ gitlab_host }}?owner=${{ user.entity.metadata.name }}&repo=${{ parameters.component_id }}"
        repoVisibility: public
        defaultBranch: main

    - id: create-argocd-app
      name: Create ArgoCD Application
      action: kubernetes:apply
      input:
        namespaced: true
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${{ parameters.component_id }}
            namespace: ${{ user.entity.metadata.name }}-demo
          spec:
            project: default
            source:
              repoURL: https://{{ gitlab_host }}/${{ user.entity.metadata.name }}/${{ parameters.component_id }}.git
              targetRevision: main
              path: manifests
            destination:
              server: https://kubernetes.default.svc
              namespace: ${{ user.entity.metadata.name }}-demo
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              retry:
                limit: -1
                backoff:
                  duration: 30s
                  maxDuration: 5m
                  factor: 2

    - id: register
      name: Register Component in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitLab Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
