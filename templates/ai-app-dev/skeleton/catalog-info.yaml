apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.component_id }}
  annotations:
    backstage.io/kubernetes-id: ${{ values.component_id }}
    backstage.io/kubernetes-namespace: ${{ values.namespace }}
    gitlab.com/project-slug: ${{ values.owner }}/${{ values.component_id }}
  links:
    - url: https://console-openshift-console.${{ values.cluster_subdomain }}/k8s/ns/${{ values.namespace }}/kubevirt.io~v1~VirtualMachine/${{ values.vm_name }}
      title: Virtual Machine
      icon: web
    - url: https://red.ht/rh-summit-2026-lb2862-vm
      title: Lab VNC Console Access
      icon: web
spec:
  type: service
  lifecycle: development
  owner: user:${{ values.owner }}
