apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ${{ values.component_id }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: ${{ values.component_id }}
    backstage.io/kubernetes-id: ${{ values.component_id }}
spec:
  to:
    kind: Service
    name: ${{ values.component_id }}
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
