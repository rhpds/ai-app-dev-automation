apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: ${{ values.vm_name }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.vm_name }}
    backstage.io/kubernetes-id: ${{ values.component_id }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  running: true
  dataVolumeTemplates:
    - metadata:
        name: ${{ values.vm_name }}-volume
      spec:
        sourceRef:
          kind: DataSource
          name: student-vm
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi
  template:
    metadata:
      labels:
        app: ${{ values.vm_name }}
        kubevirt.io/domain: ${{ values.vm_name }}
    spec:
      domain:
        cpu:
          cores: 4
        resources:
          requests:
            memory: 8Gi
          limits:
            memory: 16Gi
        devices:
          inputs:
            - type: tablet
              bus: virtio
              name: tablet
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          rng: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: ${{ values.vm_name }}-volume
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: ${{ values.owner }}
              password: changeme
              chpasswd:
                expire: false
              runcmd:
                - nmcli connection add type ethernet con-name eth0 ifname enp1s0 ipv4.method auto
                - nmcli connection up eth0
