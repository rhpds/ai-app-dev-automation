apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: ${{ values.vm_name }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.vm_name }}
    backstage.io/kubernetes-id: ${{ values.component_id }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  runStrategy: Always
  dataVolumeTemplates:
    - metadata:
        name: ${{ values.vm_name }}-disk
        annotations:
          cdi.kubevirt.io/storage.bind.immediate.requested: "true"
      spec:
        sourceRef:
          kind: DataSource
          name: student-vm
          namespace: openshift-virtualization-os-images
        storage:
          accessModes:
            - ReadWriteOnce
          volumeMode: Filesystem
          resources:
            requests:
              storage: 30Gi
  template:
    metadata:
      labels:
        app: ${{ values.vm_name }}
        vm.kubevirt.io/name: ${{ values.vm_name }}
    spec:
      tolerations:
        - key: metal
          value: reserved
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/worker-metal
                    operator: Exists
      domain:
        cpu:
          cores: 4
          model: host-passthrough
        memory:
          guest: 8G
        devices:
          inputs:
            - type: tablet
              bus: virtio
              name: tablet
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              model: virtio
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: ${{ values.vm_name }}-disk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              runcmd:
                - nmcli connection add type ethernet con-name eth0 ifname enp1s0 ipv4.method auto
                - nmcli connection up eth0
              write_files:
                - path: /home/labuser/.config/Code/User/settings.json
                  owner: labuser:labuser
                  permissions: '0644'
                  content: |
                    {
                        "files.autoSave": "afterDelay",
                        "files.autoSaveDelay": 1000,
                        "workbench.startupEditor": "none",
                        "workbench.tips.enabled": false,
                        "security.workspace.trust.enabled": false,
                        "workbench.welcomePage.walkthroughs.openOnInstall": false,
                        "github.copilot.enable": false,
                        "chat.disableAIFeatures": true,
                        "editor.wordWrap": "on"
                    }
                - path: /home/labuser/.gitconfig
                  owner: labuser:labuser
                  permissions: '0644'
                  content: |
                    [user]
                        name = labuser
                        email = labuser@parasol-insurance.com
