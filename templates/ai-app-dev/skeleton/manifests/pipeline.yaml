apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ${{ values.component_id }}-build
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  params:
    - name: git-url
      type: string
      default: https://${{ values.gitlab_host }}/${{ values.owner }}/${{ values.component_id }}.git
    - name: git-revision
      type: string
      default: main
    - name: image
      type: string
      default: image-registry.openshift-image-registry.svc:5000/${{ values.namespace }}/${{ values.component_id }}
  workspaces:
    - name: source
  tasks:
    - name: clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: SSL_VERIFY
          value: "false"
      workspaces:
        - name: output
          workspace: source

    - name: build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - clone
      params:
        - name: IMAGE
          value: $(params.image)
        - name: DOCKERFILE
          value: ./parasol-chat/Containerfile
        - name: CONTEXT
          value: ./parasol-chat
        - name: TLSVERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: source

    - name: restart-rollout
      runAfter:
        - build-image
      taskSpec:
        steps:
          - name: rollout-restart
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/bin/sh
              oc rollout restart deployment/${{ values.component_id }} -n ${{ values.namespace }}
              oc rollout status deployment/${{ values.component_id }} -n ${{ values.namespace }} --timeout=120s
