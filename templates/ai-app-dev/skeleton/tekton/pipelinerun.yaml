apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: ${{ values.component_id }}-build-
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    backstage.io/kubernetes-id: ${{ values.component_id }}
    tekton.dev/pipeline: ${{ values.component_id }}-build
spec:
  pipelineRef:
    name: ${{ values.component_id }}-build
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    - name: maven-settings
      emptyDir: {}
