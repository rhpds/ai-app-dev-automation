apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ${{ values.component_id }}-build
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    backstage.io/kubernetes-id: ${{ values.component_id }}
spec:
  params:
    - name: git-url
      type: string
      default: https://${{ values.gitlab_host }}/${{ values.owner }}/${{ values.component_id }}.git
    - name: git-revision
      type: string
      default: main
    - name: image
      type: string
      default: image-registry.openshift-image-registry.svc:5000/${{ values.namespace }}/${{ values.component_id }}
  workspaces:
    - name: source
    - name: maven_settings
  tasks:
    - name: clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: SSL_VERIFY
          value: "false"
      workspaces:
        - name: output
          workspace: source

    - name: build
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - clone
      params:
        - name: GOALS
          value:
            - package
            - -DskipTests
        - name: SUBDIRECTORY
          value: parasol-insurance
      workspaces:
        - name: source
          workspace: source
        - name: maven_settings
          workspace: maven_settings

    - name: build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - build
      params:
        - name: IMAGE
          value: $(params.image)
        - name: DOCKERFILE
          value: ./parasol-insurance/Containerfile
        - name: CONTEXT
          value: ./parasol-insurance
        - name: TLSVERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: source
